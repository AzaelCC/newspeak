<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemma 4 Live Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid #222;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .status { font-size: 13px; padding: 4px 10px; border-radius: 12px; background: #1a1a1a; }
  .status.connected { color: #4ade80; }
  .status.disconnected { color: #f87171; }
  .status.processing { color: #facc15; }

  .main { flex: 1; display: flex; overflow: hidden; }
  .video-panel {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 24px; position: relative;
  }
  video {
    max-width: 100%; max-height: 100%;
    border-radius: 12px; background: #111; transform: scaleX(-1);
  }
  .record-indicator {
    position: absolute; top: 36px; left: 36px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; opacity: 0; transition: opacity 0.2s;
  }
  .record-indicator.active { opacity: 1; }
  .record-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #f87171; animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .chat-panel { width: 400px; border-left: 1px solid #222; display: flex; flex-direction: column; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.5; max-width: 90%; }
  .msg.user { background: #1e3a5f; align-self: flex-end; color: #c0d8f0; }
  .msg.assistant { background: #1a1a2e; align-self: flex-start; color: #d0d0e8; }
  .msg .meta { font-size: 11px; color: #666; margin-top: 4px; }

  .controls { padding: 16px 24px; border-top: 1px solid #222; display: flex; align-items: center; gap: 12px; }
  button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
  #talkBtn { background: #2563eb; color: white; flex: 1; }
  #talkBtn:hover { background: #1d4ed8; }
  #talkBtn.recording { background: #dc2626; }
  #talkBtn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .toggle { background: #1a1a1a; color: #aaa; padding: 10px 14px; }
  .toggle.active { background: #1a3a1a; color: #4ade80; }
</style>
</head>
<body>

<header>
  <h1>Gemma 4 Live</h1>
  <span id="status" class="status disconnected">Disconnected</span>
</header>

<div class="main">
  <div class="video-panel">
    <video id="video" autoplay muted playsinline></video>
    <div id="recordIndicator" class="record-indicator">
      <div class="record-dot"></div>
      <span>Listening...</span>
    </div>
  </div>
  <div class="chat-panel">
    <div id="messages" class="messages"></div>
    <div class="controls">
      <button id="talkBtn" disabled>Hold to Talk</button>
      <button id="cameraToggle" class="toggle active">Camera</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const video = $('video'), talkBtn = $('talkBtn'), cameraToggle = $('cameraToggle');
const messagesDiv = $('messages'), statusEl = $('status'), recordIndicator = $('recordIndicator');

let ws, mediaStream, mediaRecorder, audioChunks = [];
let isRecording = false, cameraEnabled = true;
let audioCtx, currentSource;

// -- WebSocket --
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => { setStatus('connected', 'Connected'); talkBtn.disabled = false; };
  ws.onclose = () => { setStatus('disconnected', 'Disconnected'); talkBtn.disabled = true; setTimeout(connect, 2000); };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'text') addMessage('assistant', msg.text, `LLM: ${msg.llm_time}s`);
    else if (msg.type === 'audio') playAudio(msg.audio, msg.tts_time);
  };
}

function setStatus(cls, text) { statusEl.className = `status ${cls}`; statusEl.textContent = text; }

// -- Camera --
async function startCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }, audio: true,
    });
    video.srcObject = mediaStream;
    return;
  } catch (e) { console.warn('Video+audio failed:', e.message); }

  // Try separately
  const streams = await Promise.allSettled([
    navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } }),
    navigator.mediaDevices.getUserMedia({ audio: true }),
  ]);
  mediaStream = new MediaStream();
  streams.forEach(r => { if (r.status === 'fulfilled') r.value.getTracks().forEach(t => mediaStream.addTrack(t)); });
  if (mediaStream.getVideoTracks().length) video.srcObject = mediaStream;
  if (!mediaStream.getAudioTracks().length) { cameraEnabled = false; }
}

function captureFrame() {
  if (!cameraEnabled || !video.videoWidth) return null;
  const canvas = document.createElement('canvas');
  const scale = 320 / video.videoWidth;
  canvas.width = 320; canvas.height = video.videoHeight * scale;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

// -- Recording --
function startRecording() {
  if (!mediaStream || !mediaStream.getAudioTracks().length) return;
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  audioChunks = [];
  mediaRecorder = new MediaRecorder(new MediaStream(mediaStream.getAudioTracks()));
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    const wav = await webmToWavBase64(new Blob(audioChunks, { type: 'audio/webm' }));
    sendMessage(wav, captureFrame());
  };
  mediaRecorder.start(100);
  isRecording = true;
  talkBtn.classList.add('recording'); talkBtn.textContent = 'Recording...';
  recordIndicator.classList.add('active');
}

function stopRecording() {
  if (mediaRecorder?.state !== 'inactive') mediaRecorder?.stop();
  isRecording = false;
  talkBtn.classList.remove('recording'); talkBtn.textContent = 'Hold to Talk';
  recordIndicator.classList.remove('active');
}

async function webmToWavBase64(blob) {
  const ctx = new OfflineAudioContext(1, 1, 16000);
  const decoded = await ctx.decodeAudioData(await blob.arrayBuffer());
  const pcm = decoded.getChannelData(0);

  // Resample to 16kHz if needed
  let samples = pcm;
  if (decoded.sampleRate !== 16000) {
    const ratio = 16000 / decoded.sampleRate;
    const len = Math.round(pcm.length * ratio);
    samples = new Float32Array(len);
    for (let i = 0; i < len; i++) {
      const src = i / ratio, idx = Math.floor(src), frac = src - idx;
      samples[i] = idx + 1 < pcm.length ? pcm[idx] * (1 - frac) + pcm[idx + 1] * frac : pcm[idx];
    }
  }

  // Encode WAV
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4,36+samples.length*2,true); w(8,'WAVE'); w(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,16000,true); v.setUint32(28,32000,true); v.setUint16(32,2,true);
  v.setUint16(34,16,true); w(36,'data'); v.setUint32(40,samples.length*2,true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }

  const bytes = new Uint8Array(buf);
  let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// -- Send --
function sendMessage(audioBase64, imageBase64) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  setStatus('processing', 'Processing...');
  talkBtn.disabled = true;
  const payload = {};
  if (audioBase64) payload.audio = audioBase64;
  if (imageBase64) payload.image = imageBase64;
  addMessage('user', '(voice message)', imageBase64 ? 'with camera' : '');
  ws.send(JSON.stringify(payload));
}

// -- Playback --
async function playAudio(base64Wav, ttsTime) {
  if (currentSource) try { currentSource.stop(); } catch {}
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const bin = atob(base64Wav);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

  const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  source.start();
  currentSource = source;
  source.onended = () => { setStatus('connected', 'Connected'); talkBtn.disabled = false; };

  const meta = messagesDiv.querySelector('.msg.assistant:last-child .meta');
  if (meta) meta.textContent += ` | TTS: ${ttsTime}s`;
}

// -- UI --
function addMessage(role, text, meta) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `${text}${meta ? `<div class="meta">${meta}</div>` : ''}`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

talkBtn.addEventListener('mousedown', startRecording);
talkBtn.addEventListener('mouseup', stopRecording);
talkBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
talkBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
talkBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });

cameraToggle.addEventListener('click', () => {
  cameraEnabled = !cameraEnabled;
  cameraToggle.classList.toggle('active', cameraEnabled);
  cameraToggle.textContent = cameraEnabled ? 'Camera' : 'No Camera';
  video.style.opacity = cameraEnabled ? 1 : 0.3;
});

startCamera().then(connect);
</script>
</body>
</html>
